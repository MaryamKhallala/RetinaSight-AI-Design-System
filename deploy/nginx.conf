# Octopus — config nginx pour le service "frontend".
# Sert les fichiers statiques + proxy /api → service api (même origine).

map $sent_http_content_type $no_cache_dev {
    default "no-store";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # types corrects pour les modules / babel
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs jsx;
        image/svg+xml                         svg svgz;
        application/json                      json;
        font/woff2                            woff2;
        image/png                             png;
        image/jpeg                            jpg jpeg;
    }

    # pas de cache pendant le dev → on voit les changements
    add_header Cache-Control "no-store";

    # proxy de l'API (le front peut appeler /api/... en même origine)
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

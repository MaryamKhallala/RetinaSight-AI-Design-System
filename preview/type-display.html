<!doctype html>
<!-- @dsCard group="Type" name="Type — display" subtitle="Editorial moments · Instrument Serif + Plex Sans" viewport="700x320" -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type · Display</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px; background: var(--rs-bg); }
  .row { display:flex; align-items: baseline; gap: 18px; padding: 14px 0; border-bottom: 1px dashed var(--rs-hairline); }
  .row:last-child { border-bottom: 0; }
  .label { width: 120px; flex-shrink: 0; }
  .specimen { color: var(--rs-ink-900); }
</style>
</head>
<body class="rs-root">
  <div class="rs-eyebrow" style="margin-bottom:18px">DISPLAY · INSTRUMENT SERIF + IBM PLEX SANS</div>

  <div class="row">
    <div class="label rs-meta">5xl · 56 / 1.1</div>
    <div class="specimen rs-display" style="font-size:56px; line-height:1.1; letter-spacing:-0.02em">
      Ten thousand eyes, <em>seen.</em>
    </div>
  </div>
  <div class="row">
    <div class="label rs-meta">4xl · 44 / 1.15</div>
    <div class="specimen" style="font-family:var(--rs-font-sans); font-weight:600; font-size:44px; line-height:1.15; letter-spacing:-0.02em">
      Diabetic retinopathy, graded.
    </div>
  </div>
  <div class="row">
    <div class="label rs-meta">3xl · 32 / 1.15</div>
    <div class="specimen" style="font-family:var(--rs-font-sans); font-weight:600; font-size:32px; line-height:1.15; letter-spacing:-0.015em">
      Clinical diagnosis dashboard
    </div>
  </div>
</body>
</html>

<!doctype html>
<!-- @dsCard group="Colors" name="Colors — neutrals" subtitle="Warm graphite ink ramp" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Colors · Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--rs-bg); }
  .ramp { display:grid; grid-template-columns: repeat(9, 1fr); gap: 6px; }
  .swatch { height: 80px; border-radius: var(--rs-radius-md); border: 1px solid var(--rs-hairline); position: relative; overflow:hidden; }
  .swatch span { position:absolute; left: 8px; bottom: 6px; font-family: var(--rs-font-mono); font-size: 10px; letter-spacing: 0.06em; }
  .swatch.dark span { color: #FFF; }
  .head { display:flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
</style>
</head>
<body class="rs-root">
  <div class="head">
    <div>
      <div class="rs-eyebrow">NEUTRALS · WARM GRAPHITE</div>
      <div style="font-size:13px;color:var(--rs-fg-muted);margin-top:4px">Paper, not screen — every step carries a slight warm undertone</div>
    </div>
    <div class="rs-meta">--rs-ink-50 → 900</div>
  </div>
  <div class="ramp">
    <div class="swatch" style="background:var(--rs-ink-50)"><span>50</span></div>
    <div class="swatch" style="background:var(--rs-ink-100)"><span>100</span></div>
    <div class="swatch" style="background:var(--rs-ink-150)"><span>150</span></div>
    <div class="swatch" style="background:var(--rs-ink-200)"><span>200</span></div>
    <div class="swatch" style="background:var(--rs-ink-300)"><span>300</span></div>
    <div class="swatch dark" style="background:var(--rs-ink-400)"><span>400</span></div>
    <div class="swatch dark" style="background:var(--rs-ink-500)"><span>500</span></div>
    <div class="swatch dark" style="background:var(--rs-ink-700)"><span>700</span></div>
    <div class="swatch dark" style="background:var(--rs-ink-900)"><span>900</span></div>
  </div>
</body>
</html>

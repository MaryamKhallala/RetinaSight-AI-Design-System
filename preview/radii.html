<!doctype html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="Restrained · 10px default" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--rs-bg); }
  .head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 16px; }
  .row { display:grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .cell { display:flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 88px; height: 64px; background: var(--rs-teal-100); border: 1px solid var(--rs-teal-300); }
  .name { font-family: var(--rs-font-mono); font-size: 11px; color: var(--rs-ink-700); }
  .px { font-family: var(--rs-font-mono); font-size: 10px; color: var(--rs-fg-muted); }
</style>
</head>
<body class="rs-root">
  <div class="head">
    <div>
      <div class="rs-eyebrow">RADII · RESTRAINED</div>
      <div style="font-size:13px;color:var(--rs-fg-muted);margin-top:4px">10px is the default. Pill only for status dots and chips.</div>
    </div>
  </div>
  <div class="row">
    <div class="cell"><div class="box" style="border-radius:var(--rs-radius-xs)"></div><span class="name">xs</span><span class="px">2 px</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--rs-radius-sm)"></div><span class="name">sm</span><span class="px">4 px</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--rs-radius-md)"></div><span class="name">md</span><span class="px">6 px</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--rs-radius-lg)"></div><span class="name">lg ●</span><span class="px">10 px</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--rs-radius-xl)"></div><span class="name">xl</span><span class="px">14 px</span></div>
    <div class="cell"><div class="box" style="border-radius:var(--rs-radius-pill); width:64px"></div><span class="name">pill</span><span class="px">∞</span></div>
  </div>
</body>
</html>

<!doctype html>
<!-- @dsCard group="Brand" name="Iconography" subtitle="Lucide 1.5px + custom ophthalmology glyphs" viewport="700x280" -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Brand · Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--rs-bg); }
  .head { display:flex; justify-content:space-between; align-items: baseline; margin-bottom: 18px; }
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .cell { display:flex; flex-direction: column; gap: 6px; align-items: center; padding: 10px 6px; border-radius: var(--rs-radius-md); border: 1px solid var(--rs-hairline); background: #FFF; }
  .ico { width: 22px; height: 22px; color: var(--rs-ink-900); }
  .name { font-family: var(--rs-font-mono); font-size: 10px; color: var(--rs-fg-muted); letter-spacing: 0.04em; }
  .custom { background: var(--rs-teal-50); border-color: var(--rs-teal-200); }
  .custom .ico { color: var(--rs-teal-700); }
</style>
</head>
<body class="rs-root">
  <div class="head">
    <div>
      <div class="rs-eyebrow">ICONOGRAPHY · LUCIDE 1.5PX + CUSTOM OPHTHALMOLOGY GLYPHS</div>
      <div style="font-size:13px;color:var(--rs-fg-muted);margin-top:4px">24×24 canvas · 1.5px stroke · outlined default · filled only for status</div>
    </div>
  </div>
  <div class="grid">
    <!-- Lucide subset -->
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7"/></svg><span class="name">eye</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><span class="name">activity</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg><span class="name">layout</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg><span class="name">file-text</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 12l9 4 9-4M3 17l9 4 9-4"/></svg><span class="name">layers</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span class="name">clock</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg><span class="name">scan-line</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5"/></svg><span class="name">search</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6m0 8v6M2 12h6m8 0h6"/><circle cx="12" cy="12" r="3"/></svg><span class="name">crosshair</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="name">user</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M2 12h4M18 12h4M5 5l3 3M16 16l3 3M5 19l3-3M16 8l3-3"/></svg><span class="name">settings</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="name">message</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg><span class="name">database</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span class="name">shield</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h0"/></svg><span class="name">alert</span></div>
    <div class="cell"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 22h20L12 2z"/><path d="M12 9v5M12 18h0"/></svg><span class="name">warn</span></div>
    <!-- Custom -->
    <div class="cell custom"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6.5" opacity="0.6"/><circle cx="12" cy="12" r="3" opacity="0.4"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg><span class="name">optic-disc*</span></div>
    <div class="cell custom"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 12 Q 8 6, 14 8 T 21 6"/><path d="M14 8 Q 16 11, 18 14"/><path d="M14 8 Q 13 11, 12 15"/></svg><span class="name">vessel*</span></div>
    <div class="cell custom"><svg class="ico" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="6" height="6" opacity="0.2"/><rect x="9" y="3" width="6" height="6" opacity="0.6"/><rect x="15" y="3" width="6" height="6" opacity="0.4"/><rect x="3" y="9" width="6" height="6" opacity="0.4"/><rect x="9" y="9" width="6" height="6"/><rect x="15" y="9" width="6" height="6" opacity="0.7"/><rect x="3" y="15" width="6" height="6" opacity="0.15"/><rect x="9" y="15" width="6" height="6" opacity="0.5"/><rect x="15" y="15" width="6" height="6" opacity="0.3"/></svg><span class="name">heatmap*</span></div>
    <div class="cell custom"><svg class="ico" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg><span class="name">severity-dot*</span></div>
  </div>
</body>
</html>

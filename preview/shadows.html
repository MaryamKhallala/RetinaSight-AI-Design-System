<!doctype html>
<!-- @dsCard group="Spacing" name="Elevation" subtitle="Floating-only · 4 steps" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Elevation · Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--rs-bg); }
  .head { display:flex; justify-content:space-between; align-items: baseline; margin-bottom: 20px; }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .cell { display:flex; flex-direction: column; gap: 10px; align-items:center; }
  .box { width: 100%; height: 70px; background: #FFF; border-radius: var(--rs-radius-md); border: 1px solid var(--rs-hairline); }
  .name { font-family: var(--rs-font-mono); font-size: 11px; color: var(--rs-ink-700); }
  .desc { font-family: var(--rs-font-mono); font-size: 10px; color: var(--rs-fg-muted); text-align: center; }
</style>
</head>
<body class="rs-root">
  <div class="head">
    <div>
      <div class="rs-eyebrow">ELEVATION · FLOATING ONLY</div>
      <div style="font-size:13px;color:var(--rs-fg-muted);margin-top:4px">Borders define cards. Shadows define what floats above them.</div>
    </div>
  </div>
  <div class="row">
    <div class="cell"><div class="box" style="box-shadow: var(--rs-shadow-1)"></div><span class="name">shadow-1</span><span class="desc">resting card lift</span></div>
    <div class="cell"><div class="box" style="box-shadow: var(--rs-shadow-2)"></div><span class="name">shadow-2</span><span class="desc">dropdown / chip</span></div>
    <div class="cell"><div class="box" style="box-shadow: var(--rs-shadow-3)"></div><span class="name">shadow-3</span><span class="desc">popover / menu</span></div>
    <div class="cell"><div class="box" style="box-shadow: var(--rs-shadow-4)"></div><span class="name">shadow-4</span><span class="desc">modal / toast</span></div>
  </div>
</body>
</html>
